<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISP Uptime Capture</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 16px;
        }

        .page {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header */
        .header {
            text-align: center;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .header p {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            margin-bottom: 18px;
        }

        /* Form fields */
        .field { margin-bottom: 16px; }
        .field:last-child { margin-bottom: 0; }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .field select,
        .field input[type="number"],
        .field input[type="date"] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            color: #222;
            background: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: auto;
        }

        .field select:focus,
        .field input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
            background: white;
        }

        .field select:disabled,
        .field input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Progress section */
        .progress-card { display: none; }
        .progress-card.visible { display: block; }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-label {
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }

        .progress-count {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .progress-count span {
            color: #4f46e5;
        }

        .progress-bar-bg {
            background: #e8e8f0;
            border-radius: 99px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            transition: width 0.5s ease;
        }

        .progress-complete {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #16a34a;
            margin-top: 10px;
            display: none;
        }

        .progress-complete.visible { display: block; }

        .remaining-label {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 13px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 4px;
        }

        .btn-submit:hover:not(:disabled) {
            background: #4338ca;
        }

        .btn-submit:active:not(:disabled) {
            transform: scale(0.99);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a2e;
            color: white;
            padding: 12px 22px;
            border-radius: 99px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            z-index: 100;
        }

        .toast.success { background: #16a34a; }
        .toast.error   { background: #dc2626; }
        .toast.show    { transform: translateX(-50%) translateY(0); }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="page">

    <div class="header">
        <h1>ISP Uptime Capture</h1>
        <p>Record uptime hours per provider and time period</p>
    </div>

    <!-- Step 1: Date & Period -->
    <div class="card">
        <div class="card-title">1 — Select Period</div>

        <div class="field">
            <label for="inputDate">Capture Date</label>
            <input type="date" id="inputDate" onchange="onPeriodChange()" />
        </div>

        <div class="field">
            <label for="inputPeriod">Time Period</label>
            <select id="inputPeriod" onchange="onPeriodChange()">
                <option value="">— Select period —</option>
                <option>Sun to Mon</option>
                <option>Tue to Wed</option>
                <option>Thur to Fri</option>
            </select>
        </div>
    </div>

    <!-- Progress indicator -->
    <div class="card progress-card" id="progressCard">
        <div class="card-title">Capture Progress</div>
        <div class="progress-header">
            <span class="progress-label" id="progressLabel">Loading...</span>
            <span class="progress-count"><span id="progressCaptured">0</span> / <span id="progressTotal">0</span></span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="remaining-label" id="remainingLabel"></div>
        <div class="progress-complete" id="progressComplete">All providers captured for this period!</div>
    </div>

    <!-- Step 2: Record entry -->
    <div class="card">
        <div class="card-title">2 — Enter Record</div>

        <div class="field">
            <label for="inputName">Provider Name</label>
            <select id="inputName" disabled>
                <option value="">— Select date & period first —</option>
            </select>
        </div>

        <div class="field">
            <label for="inputHours">Uptime Hours <small style="font-weight:400;color:#999">(0 – 24)</small></label>
            <input type="number" id="inputHours" min="0" max="24" step="0.5"
                   placeholder="e.g. 18" disabled />
        </div>

        <button class="btn-submit" id="btnSubmit" onclick="submitRecord()" disabled>
            Save Record
        </button>
    </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    // Set default date to today
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];

    let progressData = null;

    // --- Period changed: load progress + update names dropdown ---
    async function onPeriodChange() {
        const date   = document.getElementById('inputDate').value;
        const period = document.getElementById('inputPeriod').value;
        const nameSelect = document.getElementById('inputName');
        const hoursInput = document.getElementById('inputHours');
        const btn        = document.getElementById('btnSubmit');

        if (!date || !period) {
            setProgressVisible(false);
            nameSelect.disabled = true;
            hoursInput.disabled = true;
            btn.disabled        = true;
            nameSelect.innerHTML = '<option value="">— Select date & period first —</option>';
            return;
        }

        // Show progress card in loading state
        setProgressVisible(true);
        document.getElementById('progressLabel').textContent = 'Loading...';
        nameSelect.disabled = true;
        hoursInput.disabled = true;
        btn.disabled        = true;

        try {
            const res = await fetch(`/api/get-progress?date=${encodeURIComponent(date)}&timePeriod=${encodeURIComponent(period)}`);
            progressData = await res.json();
            updateProgressUI();
            populateNames(progressData.remainingNames);
        } catch (e) {
            showToast('Failed to load progress', 'error');
        }
    }

    function updateProgressUI() {
        if (!progressData) return;
        const { total, captured, remaining, remainingNames } = progressData;
        const pct = total > 0 ? Math.round((captured / total) * 100) : 0;

        document.getElementById('progressCaptured').textContent = captured;
        document.getElementById('progressTotal').textContent    = total;
        document.getElementById('progressFill').style.width     = pct + '%';
        document.getElementById('progressLabel').textContent    = `${pct}% complete`;
        document.getElementById('remainingLabel').textContent   =
            remaining > 0 ? `${remaining} provider(s) still to capture` : '';

        const completeEl = document.getElementById('progressComplete');
        if (remaining === 0) {
            completeEl.classList.add('visible');
        } else {
            completeEl.classList.remove('visible');
        }
    }

    function populateNames(names) {
        const nameSelect = document.getElementById('inputName');
        const hoursInput = document.getElementById('inputHours');
        const btn        = document.getElementById('btnSubmit');

        nameSelect.innerHTML = '';

        if (!names || names.length === 0) {
            nameSelect.innerHTML = '<option value="">All providers captured</option>';
            nameSelect.disabled = true;
            hoursInput.disabled = true;
            btn.disabled        = true;
            return;
        }

        nameSelect.innerHTML = '<option value="">— Select provider —</option>' +
            names.map(n => `<option value="${escHtml(n)}">${escHtml(n)}</option>`).join('');

        nameSelect.disabled = false;
        hoursInput.disabled = false;
        btn.disabled        = false;
    }

    function setProgressVisible(show) {
        document.getElementById('progressCard').classList.toggle('visible', show);
    }

    // --- Submit ---
    async function submitRecord() {
        const date       = document.getElementById('inputDate').value;
        const period     = document.getElementById('inputPeriod').value;
        const name       = document.getElementById('inputName').value;
        const hours      = document.getElementById('inputHours').value;
        const btn        = document.getElementById('btnSubmit');

        if (!date || !period || !name || hours === '') {
            showToast('Please fill in all fields', 'error');
            return;
        }

        btn.disabled   = true;
        btn.innerHTML  = '<span class="spinner"></span>Saving...';

        try {
            const res = await fetch('/api/submit-record', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date, names: name, timePeriod: period, uptimeHours: hours }),
            });

            const data = await res.json();

            if (!res.ok) throw new Error(data.error || 'Submission failed');

            showToast(`Saved: ${name}`, 'success');

            // Clear hours, reset name selection
            document.getElementById('inputHours').value = '';
            document.getElementById('inputName').value  = '';

            // Refresh progress
            const pRes = await fetch(`/api/get-progress?date=${encodeURIComponent(date)}&timePeriod=${encodeURIComponent(period)}`);
            progressData = await pRes.json();
            updateProgressUI();
            populateNames(progressData.remainingNames);

        } catch (e) {
            showToast(e.message, 'error');
            btn.disabled  = false;
            btn.innerHTML = 'Save Record';
        }
    }

    // --- Toast ---
    let toastTimer;
    function showToast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent  = msg;
        el.className    = `toast ${type} show`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // --- Util ---
    function escHtml(str) {
        return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
</script>
</body>
</html>
